version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - \"6379:6379\"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    ports:
      - \"3001:3001\"
    environment:
      - NODE_ENV=production
      - REDIS_HOST=redis
    env_file:
      - .env
    depends_on:
      - redis
    restart: unless-stopped

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    ports:
      - \"3000:3000\"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://api:3001
    depends_on:
      - api
    restart: unless-stopped

volumes:
  redis-data:
